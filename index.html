<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meine Einkaufsliste</title>

<link rel="manifest" href="./manifest.json">

<link rel="apple-touch-icon" href="./icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Meine Einkaufsliste">

<meta name="theme-color" content="#041329">

<link rel="icon" href="./icon-192.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="login" class="login-box">


<h2>
🛒 Einkaufsliste
</h2>


<input 
id="user" 
placeholder="Benutzer">


<input 
id="pass" 
type="password" 
placeholder="Passwort">


<button onclick="login()">
Anmelden
</button>


<button onclick="register()">
Registrieren
</button>


</div>





<!-- APP -->

<div id="app">



<!-- SEITEN HEADER -->

<div class="header" id="pageTitle">

Liste

</div>






<div class="container">





<!-- SEITEN MENÜ DESKTOP -->

<div class="sidebar">


<h3>
🏪 Läden
</h3>


<div id="shops"></div>


</div>









<!-- HAUPTBEREICH -->


<div class="content">







<!-- HOME / LISTE -->


<div id="home">



<button 
class="add" 
onclick="addProduct()">

+ Einkauf hinzufügen

</button>




<div class="page-list">

<div id="products"></div>

</div>



</div>











<!-- LÄDEN -->


<div id="shopsPage" class="hidden">



<button onclick="addShop()">

+ Laden hinzufügen

</button>




<div class="page-list">

<div id="shopList"></div>

</div>



</div>











<!-- EINSTELLUNGEN -->


<div id="settings" class="hidden">



<div class="shop-panel">


Angemeldet als:

<br>

<b id="username"></b>


</div>




<button onclick="logout()">

Abmelden

</button>



</div>








</div>

<!-- content Ende -->



</div>

<!-- container Ende -->









<!-- MOBILE NAVIGATION -->


<div class="mobile-nav">



<button onclick="showPage('home')">

🏠

<span>
Liste
</span>

</button>







<button onclick="showPage('shopsPage')">

🏪

<span>
Läden
</span>

</button>







<button onclick="showPage('settings')">

⚙️

<span>
Optionen
</span>

</button>




</div>













<!-- PRODUKT MODAL -->


<div id="productModal" class="modal hidden">



<div class="modal-box">





<h2>

🛒 Einkauf hinzufügen

</h2>








<label>

🏪 Laden

</label>



<select id="productShop">

</select>









<label>

🛒 Ware

</label>



<input

id="productName"

type="text"

placeholder="Name der Ware">




<label>

🔢 Anzahl

</label>



<div class="amount-box">



<input

id="productAmount"

type="number"

min="1"

inputmode="numeric"

placeholder="Menge">





<select id="productUnit">


<option value="Stück">

Stück

</option>


<option value="kg">

kg

</option>


</select>



</div>









<label>

📝 Notiz

</label>



<textarea

id="productNote"

placeholder="Notiz">

</textarea>









<button

class="add"

onclick="saveProduct()">

✅ Speichern

</button>








<button

onclick="closeProductModal()">

❌ Abbrechen

</button>







</div>


</div>



</div>


<script src="app.js"></script>

</body>
</html>
